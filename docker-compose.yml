services:
  postgres:
    image: postgres:16-alpine
    container_name: slideshow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: slideshow
      POSTGRES_PASSWORD: slideshow_dev
      POSTGRES_DB: slideshow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slideshow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: slideshow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pptx-pipeline:
    build:
      context: ./packages/pptx-pipeline
      dockerfile: Dockerfile
    container_name: slideshow-pptx-pipeline
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - ./apps/web/public/slides:/app/output
      - upload_data:/app/uploads
    environment:
      - OUTPUT_DIR=/app/output
      - UPLOAD_DIR=/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  upload_data:
