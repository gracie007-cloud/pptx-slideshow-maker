steps:
  # ─── Configure Docker for Artifact Registry ──────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    id: "auth-docker"
    args: ["auth", "configure-docker", "us-central1-docker.pkg.dev", "--quiet"]
    waitFor: ["-"]

  # ─── Build Next.js web app ───────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-web"
    args:
      - build
      - -t
      - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/web:$_TAG"
      - -t
      - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/web:latest"
      - -f
      - apps/web/Dockerfile
      - .
    waitFor: ["auth-docker"]

  # ─── Build realtime server ───────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-realtime"
    args:
      - build
      - -t
      - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/realtime:$_TAG"
      - -t
      - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/realtime:latest"
      - -f
      - packages/realtime/Dockerfile
      - .
    waitFor: ["auth-docker"]

  # ─── Build Python PPTX pipeline ──────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-pipeline"
    args:
      - build
      - -t
      - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/pipeline:$_TAG"
      - -t
      - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/pipeline:latest"
      - -f
      - packages/pptx-pipeline/Dockerfile
      - packages/pptx-pipeline
    waitFor: ["auth-docker"]

  # ─── Build migration image ───────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-migrate"
    args:
      - build
      - -t
      - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/migrate:$_TAG"
      - -f
      - apps/web/Dockerfile.migrate
      - .
    waitFor: ["auth-docker"]

  # ─── Push images ─────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-web"
    args: ["push", "--all-tags", "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/web"]
    waitFor: ["build-web"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-migrate"
    args: ["push", "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/migrate:$_TAG"]
    waitFor: ["build-migrate"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-realtime"
    args: ["push", "--all-tags", "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/realtime"]
    waitFor: ["build-realtime"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-pipeline"
    args: ["push", "--all-tags", "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/pipeline"]
    waitFor: ["build-pipeline"]

  # ─── Run DB migrations via Cloud Run Job (inside VPC, has Cloud SQL access) ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "migrate-db"
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        IMAGE="us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/migrate:$_TAG"
        JOB="slideshow-migrate"
        # Create or update the migration job
        gcloud run jobs create $JOB \
          --image="$IMAGE" \
          --region=$_REGION \
          --vpc-connector=projects/$PROJECT_ID/locations/$_REGION/connectors/slideshow-connector \
          --vpc-egress=private-ranges-only \
          --set-cloudsql-instances=$PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE \
          --set-secrets=DATABASE_URL=slideshow-database-url:latest \
          --service-account=slideshow-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --memory=512Mi \
          --max-retries=1 \
          --project=$PROJECT_ID 2>/dev/null || \
        gcloud run jobs update $JOB \
          --image="$IMAGE" \
          --region=$_REGION \
          --vpc-connector=projects/$PROJECT_ID/locations/$_REGION/connectors/slideshow-connector \
          --vpc-egress=private-ranges-only \
          --set-cloudsql-instances=$PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE \
          --set-secrets=DATABASE_URL=slideshow-database-url:latest \
          --service-account=slideshow-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --memory=512Mi \
          --max-retries=1 \
          --project=$PROJECT_ID
        # Execute and wait
        gcloud run jobs execute $JOB --wait --region=$_REGION --project=$PROJECT_ID
    waitFor: ["push-migrate"]

  # ─── Deploy slideshow-web ─────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-web"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - slideshow-web
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/web:$_TAG
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --service-account=slideshow-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --vpc-connector=projects/$PROJECT_ID/locations/$_REGION/connectors/slideshow-connector
      - --vpc-egress=private-ranges-only
      - --set-cloudsql-instances=$PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE
      - --set-secrets=DATABASE_URL=slideshow-database-url:latest,AUTH_SECRET=slideshow-auth-secret:latest,NEXTAUTH_URL=slideshow-nextauth-url:latest
      - --set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,PIPELINE_URL=https://slideshow-pipeline-$_REGION-$PROJECT_ID.a.run.app,GCS_BUCKET=$_GCS_BUCKET,NEXT_PUBLIC_REALTIME_URL=https://slideshow-realtime-$_REGION-$PROJECT_ID.a.run.app,GCP_PROJECT=$PROJECT_ID
    waitFor: ["migrate-db"]

  # ─── Deploy slideshow-realtime ────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-realtime"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - slideshow-realtime
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/realtime:$_TAG
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3001
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --service-account=slideshow-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --set-secrets=REDIS_URL=slideshow-redis-url:latest
      - --set-env-vars=NODE_ENV=production
    waitFor: ["push-realtime"]

  # ─── Deploy slideshow-pipeline ────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-pipeline"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - slideshow-pipeline
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/pipeline:$_TAG
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated
      - --port=8100
      - --memory=2Gi
      - --cpu=2
      - --min-instances=0
      - --max-instances=5
      - --timeout=300
      - --service-account=slideshow-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GCS_BUCKET=$_GCS_BUCKET,GCP_PROJECT=$PROJECT_ID
    waitFor: ["push-pipeline"]

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/web:$_TAG"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/web:latest"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/realtime:$_TAG"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/realtime:latest"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/pipeline:$_TAG"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/pipeline:latest"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/slideshow/migrate:$_TAG"

substitutions:
  _REGION: us-central1
  _GCS_BUCKET: slideshow-uploads-ai-agent-dev-486423
  _CLOUDSQL_INSTANCE: slideshow-db
  _TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
