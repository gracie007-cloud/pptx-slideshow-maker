steps:
  # ─── Build Next.js web app ───────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-web"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/slideshow-web:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/slideshow-web:latest"
      - -f
      - apps/web/Dockerfile
      - .
    waitFor: ["-"]

  # ─── Build realtime server ───────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-realtime"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/slideshow-realtime:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/slideshow-realtime:latest"
      - -f
      - packages/realtime/Dockerfile
      - .
    waitFor: ["-"]

  # ─── Build Python PPTX pipeline ──────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-pipeline"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/slideshow-pipeline:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/slideshow-pipeline:latest"
      - -f
      - packages/pptx-pipeline/Dockerfile
      - packages/pptx-pipeline
    waitFor: ["-"]

  # ─── Push images ─────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-web"
    args: ["push", "--all-tags", "gcr.io/$PROJECT_ID/slideshow-web"]
    waitFor: ["build-web"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-realtime"
    args: ["push", "--all-tags", "gcr.io/$PROJECT_ID/slideshow-realtime"]
    waitFor: ["build-realtime"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-pipeline"
    args: ["push", "--all-tags", "gcr.io/$PROJECT_ID/slideshow-pipeline"]
    waitFor: ["build-pipeline"]

  # ─── Run DB migrations via Cloud SQL proxy ───────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    id: "migrate-db"
    entrypoint: bash
    args:
      - -c
      - |
        # Install cloud-sql-proxy
        curl -sL https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64 \
          -o /cloud-sql-proxy && chmod +x /cloud-sql-proxy
        # Start proxy in background
        /cloud-sql-proxy --unix-socket /cloudsql $PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE &
        sleep 3
        # Pull DB URL from Secret Manager (replace host placeholder)
        DB_URL=$(gcloud secrets versions access latest --secret=slideshow-database-url --project=$PROJECT_ID)
        export DATABASE_URL="$DB_URL"
        # Generate prisma client and run migrations
        cd /workspace/apps/web
        cp prisma/schema.production.prisma prisma/schema.prisma
        npm install -g pnpm
        pnpm exec prisma generate
        pnpm exec prisma migrate deploy 2>&1 || \
          pnpm exec prisma db push --accept-data-loss 2>&1
    waitFor: ["push-web"]

  # ─── Deploy slideshow-web ─────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-web"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - slideshow-web
      - --image=gcr.io/$PROJECT_ID/slideshow-web:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --service-account=slideshow-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --vpc-connector=projects/$PROJECT_ID/locations/$_REGION/connectors/slideshow-connector
      - --vpc-egress=private-ranges-only
      - --set-cloudsql-instances=$PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE
      - --set-secrets=DATABASE_URL=slideshow-database-url:latest,AUTH_SECRET=slideshow-auth-secret:latest,NEXTAUTH_URL=slideshow-nextauth-url:latest
      - --set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,PIPELINE_URL=https://slideshow-pipeline-$_REGION-$PROJECT_ID.a.run.app,GCS_BUCKET=$_GCS_BUCKET,NEXT_PUBLIC_REALTIME_URL=https://slideshow-realtime-$_REGION-$PROJECT_ID.a.run.app,GCP_PROJECT=$PROJECT_ID
    waitFor: ["migrate-db"]

  # ─── Deploy slideshow-realtime ────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-realtime"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - slideshow-realtime
      - --image=gcr.io/$PROJECT_ID/slideshow-realtime:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3001
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --service-account=slideshow-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --set-secrets=REDIS_URL=slideshow-redis-url:latest
      - --set-env-vars=NODE_ENV=production
    waitFor: ["push-realtime"]

  # ─── Deploy slideshow-pipeline ────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-pipeline"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - slideshow-pipeline
      - --image=gcr.io/$PROJECT_ID/slideshow-pipeline:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated
      - --port=8100
      - --memory=2Gi
      - --cpu=2
      - --min-instances=0
      - --max-instances=5
      - --timeout=300
      - --service-account=slideshow-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GCS_BUCKET=$_GCS_BUCKET,GCP_PROJECT=$PROJECT_ID
    waitFor: ["push-pipeline"]

images:
  - "gcr.io/$PROJECT_ID/slideshow-web:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/slideshow-web:latest"
  - "gcr.io/$PROJECT_ID/slideshow-realtime:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/slideshow-realtime:latest"
  - "gcr.io/$PROJECT_ID/slideshow-pipeline:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/slideshow-pipeline:latest"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/slideshow-database-url/versions/latest
      env: DATABASE_URL

substitutions:
  _REGION: us-central1
  _GCS_BUCKET: slideshow-uploads-$PROJECT_ID
  _CLOUDSQL_INSTANCE: slideshow-db

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
